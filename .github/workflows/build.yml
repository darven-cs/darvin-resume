name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        type: string

env:
  NODE_OPTIONS: '--max-old-space-size=4096'
  GO_VERSION: '1.25'
  APP_NAME: 'Darvin-Resume'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Build Linux binary (no packaging — handled by package-deb-rpm job)
  # ─────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            build-essential \
            gcc

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux binary
        run: |
          cd frontend && npm install && cd ..
          wails build --platform linux/amd64 --nopackage

      - name: Upload Linux binary and assets
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-binary
          path: |
            build/bin/Darvin-Resume
            packaging/linux/
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Build Windows NSIS installer
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows NSIS installer
        run: |
          cd frontend && npm install && cd ..
          wails build --platform windows/amd64 --nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-installer
          path: build/bin/Darvin-Resume-*-amd64.exe
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Build macOS app bundle
  # ─────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS app bundle
        run: |
          cd frontend && npm install && cd ..
          wails build --platform darwin/universal

      - name: Install create-dmg
        run: |
          brew install create-dmg

      - name: Package as DMG
        run: |
          create-dmg \
            --volname "Darvin-Resume" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Darvin-Resume.app" 150 185 \
            --app-drop-link 450 185 \
            --hide-extension "Darvin-Resume.app" \
            --format UDBZ \
            "build/Darvin-Resume-macos-universal.dmg" \
            "build/bin/Darvin-Resume.app"

      - name: Verify DMG
        run: |
          ls -lh build/*.dmg
          hdiutil imageinfo build/Darvin-Resume-macos-universal.dmg 2>&1 | grep -E "(Format:|Max Compression)" || true

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-dmg
          path: build/Darvin-Resume-macos-universal.dmg
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Package Linux binary into .deb and .rpm (runs after build-linux)
  # ─────────────────────────────────────────────────────────────────────────
  package-deb-rpm:
    needs: build-linux
    runs-on: ubuntu-22.04
    steps:
      - name: Set version env
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION=1.0.0" >> $GITHUB_ENV
          fi
          echo "Package version: $VERSION"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: linux-amd64-binary
          path: .

      - name: Make binary executable
        run: chmod +x ./build/bin/Darvin-Resume

      - name: Download nfpm
        run: |
          NFMV_VERSION=$(curl -s https://api.github.com/repos/goreleaser/nfpm/releases/latest | grep '"tag_name":' | sed 's/.*"v\?\([^"]*\)".*/\1/' | head -1)
          echo "Latest nfpm version: $NFMV_VERSION"
          curl -sL "https://github.com/goreleaser/nfpm/releases/download/v${NFMV_VERSION}/nfpm_${NFMV_VERSION}_Linux_x86_64.tar.gz" -o nfpm.tar.gz
          tar xzf nfpm.tar.gz
          sudo mv nfpm /usr/local/bin/nfpm
          chmod +x /usr/local/bin/nfpm
          nfpm version

      - name: Download nfpm config assets
        run: |
          cp packaging/linux/darvin-resume.desktop ./darvin-resume.desktop
          cp packaging/linux/com.darven.darvin-resume.appdata.xml ./com.darven.darvin-resume.appdata.xml

      - name: Create nfpm configuration
        run: |
          mkdir -p dist
          cat > nfpm.yml << 'YAML'
          name: darvin-resume
          version: ${VERSION}
          arch: amd64
          platform: linux
          section: utils
          priority: optional
          description: Markdown原生、隐私优先的本地化简历工具
          maintainer: Darvin-Resume <darven@example.com>
          homepage: https://github.com/darven-cs/darvin-resume
          license: MIT

          # Per-packager overrides for different dependency names
          overrides:
            deb:
              depends:
                - libgtk-3-0
                - libwebkit2gtk-4.0-37
                - libayatana-appindicator3-1
            rpm:
              depends:
                - gtk3
                - webkit2gtk4.0
                - libappindicator-gtk3

          contents:
            # Main executable - regular file, no type needed
            - src: ./build/bin/Darvin-Resume
              dst: /usr/bin/darvin-resume
            # Desktop entry
            - src: darvin-resume.desktop
              dst: /usr/share/applications/darvin-resume.desktop
            # AppStream metadata
            - src: com.darven.darvin-resume.appdata.xml
              dst: /usr/share/metainfo/com.darven.darvin-resume.appdata.xml

          YAML

      - name: Build .deb package
        run: |
          nfpm pkg \
            --packager deb \
            --config nfpm.yml \
            --target ./dist/

      - name: Build .rpm package
        run: |
          nfpm pkg \
            --packager rpm \
            --config nfpm.yml \
            --target ./dist/

      - name: Verify packages
        run: |
          echo "=== Generated packages ==="
          ls -lh dist/
          echo ""
          DEB_FILE=$(ls dist/*.deb)
          RPM_FILE=$(ls dist/*.rpm)
          echo "=== .deb metadata ==="
          dpkg-deb -info "$DEB_FILE"
          echo ""
          echo "=== .rpm metadata ==="
          rpm -qpi "$RPM_FILE"

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5: Create GitHub Release (runs after all builds)
  # ─────────────────────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows, build-macos, package-deb-rpm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Flatten artifact directories
          find ./artifacts -type f -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "VERSION=${TAG_NAME#v}" >> $GITHUB_OUTPUT
          echo "Version: $TAG_NAME"

      - name: Generate release notes
        run: |
          # Generate simple changelog from recent commits
          CHANGELOG=$(git log --oneline -20 | head -15)
          echo "## Darvin-Resume v${GITHUB_REF#refs/tags/v}" > release-notes.md
          echo "" >> release-notes.md
          echo "### Downloads" >> release-notes.md
          echo "" >> release-notes.md
          echo "| Platform | File |" >> release-notes.md
          echo "|----------|------|" >> release-notes.md
          for f in release-assets/*; do
            fname=$(basename "$f")
            ext="${fname##*.}"
            case "$ext" in
              deb) plat="Linux (Debian/Ubuntu)" ;;
              rpm) plat="Linux (Fedora/RHEL)" ;;
              exe) plat="Windows (NSIS Installer)" ;;
              dmg) plat="macOS (DMG)" ;;
              *)   plat="Other" ;;
            esac
            echo "| $plat | \`$fname\` |" >> release-notes.md
          done
          echo "" >> release-notes.md
          echo "### Recent Changes" >> release-notes.md
          echo '```' >> release-notes.md
          echo "$CHANGELOG" >> release-notes.md
          echo '```' >> release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: 'Darvin-Resume ${{ github.ref }}'
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
