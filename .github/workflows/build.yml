name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        type: string

env:
  NODE_OPTIONS: '--max-old-space-size=4096'
  GO_VERSION: '1.25'
  APP_NAME: 'Darvin-Resume'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Build Linux packages (matrix: webkit2gtk-4.0 + webkit2gtk-4.1)
  # ─────────────────────────────────────────────────────────────────────────
  build-linux-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: webkit40
            runner: ubuntu-22.04
            webkit_dev_pkg: libwebkit2gtk-4.0-dev
            wails_tags: ""
            deb_runtime: libwebkit2gtk-4.0-37
            rpm_runtime: webkit2gtk4.0
          - variant: webkit41
            runner: ubuntu-24.04
            webkit_dev_pkg: libwebkit2gtk-4.1-dev
            wails_tags: "webkit2_41"
            deb_runtime: libwebkit2gtk-4.1-0
            rpm_runtime: webkit2gtk4.1
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            ${{ matrix.webkit_dev_pkg }} \
            pkg-config \
            build-essential \
            gcc \
            rpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux binary
        run: |
          cd frontend && npm install && cd ..
          if [ -n "${{ matrix.wails_tags }}" ]; then
            wails build --platform linux/amd64 --nopackage -tags "${{ matrix.wails_tags }}"
          else
            wails build --platform linux/amd64 --nopackage
          fi

      - name: Set version env
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION=1.1.2" >> $GITHUB_ENV
          fi

      - name: Download nfpm
        run: |
          NFMV_VERSION=$(curl -s https://api.github.com/repos/goreleaser/nfpm/releases/latest \
            | grep '"tag_name":' | sed 's/.*"v\?\([^"]*\)".*/\1/' | head -1)
          echo "Latest nfpm version: $NFMV_VERSION"
          curl -sL "https://github.com/goreleaser/nfpm/releases/download/v${NFMV_VERSION}/nfpm_${NFMV_VERSION}_Linux_x86_64.tar.gz" \
            -o nfpm.tar.gz
          tar xzf nfpm.tar.gz
          sudo mv nfpm /usr/local/bin/nfpm
          chmod +x /usr/local/bin/nfpm

      - name: Prepare packaging assets
        run: |
          cp packaging/linux/darvin-resume.desktop ./darvin-resume.desktop
          cp packaging/linux/com.darven.darvin-resume.appdata.xml ./com.darven.darvin-resume.appdata.xml

      - name: Create nfpm configuration
        run: |
          mkdir -p dist
          cat > nfpm.yml << 'YAML'
          name: darvin-resume
          version: ${VERSION}
          arch: amd64
          platform: linux
          section: utils
          priority: optional
          description: Markdown原生、隐私优先的本地化简历工具
          maintainer: Darvin-Resume <darven@example.com>
          homepage: https://github.com/darven-cs/darvin-resume
          license: MIT

          overrides:
            deb:
              depends:
                - libgtk-3-0
                - ${{ matrix.deb_runtime }}
                - libayatana-appindicator3-1
            rpm:
              depends:
                - gtk3
                - ${{ matrix.rpm_runtime }}
                - libappindicator-gtk3

          contents:
            - src: ./build/bin/Darvin-Resume
              dst: /usr/bin/darvin-resume
            - src: darvin-resume.desktop
              dst: /usr/share/applications/darvin-resume.desktop
            - src: com.darven.darvin-resume.appdata.xml
              dst: /usr/share/metainfo/com.darven.darvin-resume.appdata.xml
          YAML

      - name: Build .deb and .rpm packages
        run: |
          nfpm pkg --packager deb --config nfpm.yml --target ./dist/
          nfpm pkg --packager rpm --config nfpm.yml --target ./dist/
          # Add variant suffix for disambiguation
          for f in dist/*; do
            ext="${f##*.}"
            base="${f%.*}"
            mv "$f" "${base}_${{ matrix.variant }}.${ext}"
          done
          echo "=== Generated packages ==="
          ls -lh dist/

      - name: Verify packages
        run: |
          DEB_FILE=$(ls dist/*.deb)
          echo "=== .deb metadata ==="
          dpkg-deb --info "$DEB_FILE"
          echo ""
          RPM_FILE=$(ls dist/*.rpm)
          echo "=== .rpm metadata ==="
          rpm -qpi "$RPM_FILE"

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.variant }}
          path: |
            dist/*.deb
            dist/*.rpm
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Build Windows NSIS installer
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build Windows NSIS installer (WebView2 auto-download)
        run: |
          cd frontend; npm install; cd ..
          wails build --platform windows/amd64 --nsis -webview2 download -trimpath
          Get-ChildItem build/bin/

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-installer
          path: build/bin/
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Create GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  release:
    needs: [build-linux-packages, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/linux-packages-webkit40/*.deb release-assets/ 2>/dev/null || true
          cp artifacts/linux-packages-webkit40/*.rpm release-assets/ 2>/dev/null || true
          cp artifacts/linux-packages-webkit41/*.deb release-assets/ 2>/dev/null || true
          cp artifacts/linux-packages-webkit41/*.rpm release-assets/ 2>/dev/null || true
          find artifacts/windows-amd64-installer -name "*.exe" -type f -exec cp {} release-assets/ \; 2>/dev/null || true
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Generate release notes
        run: |
          cat > release-notes.md << 'HEADER'
          ## Downloads
          | Platform | Compatible Distros | File |
          |----------|-------------------|------|
          HEADER

          for f in release-assets/*; do
            fname=$(basename "$f")
            ext="${fname##*.}"
            case "$ext" in
              deb)
                if echo "$fname" | grep -q "webkit40"; then
                  plat="Linux .deb (webkit2gtk-4.0)"
                  compat="Ubuntu 20.04/22.04, Debian 11+"
                else
                  plat="Linux .deb (webkit2gtk-4.1)"
                  compat="Ubuntu 24.04+, Debian 13+"
                fi ;;
              rpm)
                if echo "$fname" | grep -q "webkit40"; then
                  plat="Linux .rpm (webkit2gtk-4.0)"
                  compat="Fedora 39-, RHEL 9"
                else
                  plat="Linux .rpm (webkit2gtk-4.1)"
                  compat="Fedora 40+"
                fi ;;
              exe)
                plat="Windows (NSIS Installer)"
                compat="Windows 10+"
                ;;
              *) plat="Other"; compat="" ;;
            esac
            echo "| $plat | $compat | \`$fname\` |" >> release-notes.md
          done

          echo "" >> release-notes.md
          echo "### Recent Changes" >> release-notes.md
          echo '```' >> release-notes.md
          git log --oneline -15 >> release-notes.md
          echo '```' >> release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: 'Darvin-Resume ${{ github.ref }}'
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
